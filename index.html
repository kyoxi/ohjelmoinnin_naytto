<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kierpp.is</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-blue-200 via-indigo-100 to-purple-200 min-h-screen">

  <!-- KIRJAUTUMISSIVU -->
  <div id="auth-section" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-blue-600 italic">Kierpp.is
        </h1>
        <p class="text-slate-500 mt-2">Kirjaudu sisään tai luo tunnus</p>
      </div>
      <input type="text" id="username" placeholder="Käyttäjätunnus" class="w-full p-3 mb-4 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      <input type="password" id="password" placeholder="Salasana" class="w-full p-3 mb-6 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      <button onclick="App.handleAuth()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200">Aloita kaupankäynti</button>
    </div>
  </div>

  <!-- PÄÄNÄKYMÄ -->
  <div id="main-section" class="hidden">
<!-- Navigointi -->
<nav class="bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 text-white shadow-sm sticky top-0 z-50 border-b">
  <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
    
    <!-- LOGO + TEKSTI -->
    <div class="flex items-center gap-2">
<div class="flex items-center gap-2">
  <h1 class="text-xl font-black text-white italic tracking-tighter">KIRPPIS.IO</h1>
  <img src="logo.avif" alt="Logo" style="height: 40px; width: auto; object-fit: contain;">
</div>
    
    <!-- NAPIT -->
    <div class="flex gap-2">
      <button onclick="App.naytaSivu('kaikki')" class="px-4 py-2 hover:bg-white/20 rounded-lg font-medium transition">🏠 Selaa</button>
      <button onclick="App.naytaSivu('viestit')" class="px-4 py-2 hover:bg-white/20 rounded-lg font-medium transition">💬 Viestit</button>
      <button onclick="App.naytaSivu('omat')" class="px-4 py-2 hover:bg-white/20 rounded-lg font-medium transition">👤 Omat</button>
      <button onclick="App.logout()" class="ml-4 px-4 py-2 bg-red-500 text-white rounded-lg font-bold hover:bg-red-600 transition">Ulos</button>
    </div>

  </div>
</nav>

    <main class="max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <!-- VASEN SARAKE: LISÄYS JA HAKU -->
      <aside class="lg:col-span-4 space-y-6">
        <!-- Käyttäjän tiedot -->
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl text-white shadow-lg">
          <p class="opacity-80">Tervetuloa takaisin,</p>
          <h2 id="user-display" class="text-2xl font-bold">Käyttäjä</h2>
        </div>

        <!-- Haku & Suodatus -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <h3 class="font-bold mb-4 flex items-center gap-2">🔍 Etsi aarteita</h3>
          <input type="text" id="haku-kentta" placeholder="Mitä etsit tänään?" oninput="App.suodata()" class="w-full p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none mb-4">
          <select id="suodatin-kategoria" onchange="App.suodata()" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
            <option value="kaikki">Kaikki kategoriat</option>
            <option value="Myydään">Myydään</option>
            <option value="Ostetaan">Ostetaan</option>
            <option value="Annetaan">Annetaan</option>
            <option value="Vaihdetaan">Vaihdetaan</option>
            <option value="Vuokrataan">Vuokrataan</option>
          </select>
        </div>

        <!-- Lisäyslomake -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <h3 class="font-bold mb-4 flex items-center gap-2">➕ Lisää ilmoitus</h3>
          <div class="space-y-3">
            <input type="text" id="p-nimi" placeholder="Otsikko" class="w-full p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            <textarea id="p-kuvaus" placeholder="Kuvaus..." class="w-full p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none h-24"></textarea>
            <select id="p-kategoria" onchange="App.tarkistaHinta()" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                <option value="Myydään">Myydään</option>
                <option value="Ostetaan">Ostetaan</option>
                <option value="Annetaan">Annetaan</option>
                <option value="Vaihdetaan">Vaihdetaan</option>
                <option value="Vuokrataan">Vuokrataan</option>
            </select>
            <div id="hinta-container">
              <input type="number" id="p-hinta" placeholder="Hinta (€)" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
            </div>
            <label class="block text-sm font-medium text-slate-500 mt-2">Kuvakaappaus tai valokuva</label>
            <input type="file" id="p-kuva" accept="image/*" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            <button onclick="App.lisaaIlmoitus()" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl hover:bg-emerald-600 transition shadow-lg shadow-emerald-100">Julkaise ilmoitus</button>
          </div>
        </div>
      </aside>

      <!-- OIKEA SARAKE: LISTA -->
      <section class="lg:col-span-8">
        <div class="flex justify-between items-center mb-6">
            <h2 id="listan-otsikko" class="text-2xl font-black text-slate-800 tracking-tight">Tuoreimmat ilmoitukset</h2>
            <div id="loading-indicator" class="hidden animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
        </div>
        <div id="tuotelista" class="space-y-6">
            <!-- Ilmoitukset latautuvat tässä -->
        </div>
      </section>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
